name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  plugin:
    name: Build plugin
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build plugin package
        run: .\gradlew.bat --no-daemon plugin

      - name: Upload plugin package
        uses: actions/upload-artifact@v4
        with:
          name: AMLL-TTML-Loader
          path: out/plugin/AMLL-TTML-Loader-*.zip
          if-no-files-found: error

      - name: Publish v1.0.1 release asset
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.1
          name: AMLL TTML Loader for Salt Player v1.0.1
          files: out/plugin/AMLL-TTML-Loader-*.zip
          fail_on_unmatched_files: true
          overwrite_files: true
          body: |
            - Added runtime logs for easier troubleshooting.
            - Added plugin settings for log control.
            - Logs now record key search, match, conversion, cache, fallback, and error events.
            - Added automatic cleanup for old log files.
            - Improved README, troubleshooting, privacy, and third-party notices.
            - Fixed plugin open-source URL in manifest metadata.
