name: Build

on:
  push:
  pull_request:

jobs:
  plugin:
    name: Build plugin
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build plugin package
        run: .\gradlew.bat --no-daemon plugin

      - name: Upload plugin package
        uses: actions/upload-artifact@v4
        with:
          name: AMLL-TTML-Loader
          path: out/plugin/AMLL-TTML-Loader-*.zip
          if-no-files-found: error
