name: Build

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish when manually dispatched
        required: false
        default: v1.0.1

permissions:
  contents: write

jobs:
  plugin:
    name: Build plugin
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build plugin package
        run: .\gradlew.bat --no-daemon plugin

      - name: Upload plugin package
        uses: actions/upload-artifact@v4
        with:
          name: AMLL-TTML-Loader
          path: out/plugin/AMLL-TTML-Loader-*.zip
          if-no-files-found: error

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          files: out/plugin/AMLL-TTML-Loader-*.zip
          fail_on_unmatched_files: true
          overwrite_files: true
